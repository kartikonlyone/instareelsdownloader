<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastVideoSave Pro | HD Downloader</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --primary: #e1306c; --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: var(--insta-grad); width: 100%; color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 500px; width: 90%; background: white; margin-top: 50px; padding: 35px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); text-align: center; }
        
        .input-box { display: flex; border: 2px solid #ddd; border-radius: 14px; overflow: hidden; margin-top: 25px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary); }
        input { flex: 1; padding: 18px; border: none; outline: none; font-size: 16px; width: 100%; }
        button#btn { background: var(--primary); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button#btn:disabled { background: #ccc; cursor: not-allowed; }

        #loader { display: none; margin: 25px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result { display: none; margin-top: 35px; padding: 25px; background: #fafafa; border-radius: 20px; border: 1px solid #eee; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumb { width: 100%; max-width: 260px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .dl-btn { background: #059669; color: white; padding: 16px 40px; text-decoration: none; border-radius: 12px; display: inline-block; font-weight: bold; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3); width: 100%; box-sizing: border-box; }
        .dl-btn:hover { background: #047857; transform: scale(1.02); }
        .note { font-size: 11px; color: #777; margin-top: 15px; background: #fff3cd; padding: 10px; border-radius: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<header><h1>FastVideoSave Pro</h1></header>

<div class="container">
    <h2 style="margin:0;">Instagram Downloader</h2>
    <p style="color:#666; font-size:14px;">Download Reels, Videos & Stories in HD</p>
    
    <div class="input-box">
        <input type="text" id="instaLink" placeholder="Paste Instagram link here...">
        <button id="btn" onclick="startDownload()">Fetch</button>
    </div>

    <div id="loader"></div>

    <div class="result" id="resCard">
        <img id="preview" class="thumb" src="">
        <p><strong style="color:#059669;">Video Found! 🎉</strong></p>
        <a href="" id="dlLink" class="dl-btn" target="_blank" rel="noreferrer" referrerpolicy="no-referrer" download>DOWNLOAD VIDEO</a>
        <div class="note">
            <b>Bhai Tip:</b> Agar direct download na ho, toh button par <b>Long Press</b> karke <b>"Download Link"</b> select karein. Login nahi maangega.
        </div>
    </div>
</div>

<script>
    async function startDownload() {
        const linkVal = document.getElementById('instaLink').value.trim();
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const card = document.getElementById('resCard');

        if(!linkVal) return alert("Bhai, pehle link toh dalo!");

        const KEY = 'aca31a75b6msh557466d454b2104p18dfeajsn57348f5e9cc8';
        const HOST = 'instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com';

        btn.disabled = true;
        loader.style.display = 'block';
        card.style.display = 'none';

        try {
            const response = await fetch(`https://${HOST}/convert?url=${encodeURIComponent(linkVal)}`, {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': KEY,
                    'x-rapidapi-host': HOST
                }
            });

            const data = await response.json();
            console.log("Asli Data Jo API ne Bheja:", data);

            let videoUrl = "";
            let thumbUrl = "";

            // --- ADVANCED AUTO-SCANNER ---
            // Ye function pure JSON me 'url' dhoondega chahe wo kisi bhi naam se ho
            function deepScan(obj) {
                for (let key in obj) {
                    if (typeof obj[key] === 'string' && (obj[key].includes('.mp4') || obj[key].includes('video') || obj[key].includes('fbcdn'))) {
                        return obj[key];
                    }
                    if (typeof obj[key] === 'object' && obj[key] !== null) {
                        let found = deepScan(obj[key]);
                        if (found) return found;
                    }
                }
                return null;
            }

            videoUrl = deepScan(data);
            
            // Thumbnail Scan
            thumbUrl = data.thumbnail || (data.data && data.data[0] ? data.data[0].thumbnail : null) || 'https://via.placeholder.com/250x400?text=Video+Ready';

            if (videoUrl) {
                document.getElementById('preview').src = thumbUrl;
                document.getElementById('dlLink').href = videoUrl;
                card.style.display = 'block';
            } else {
                alert("Nahi mila! Console (F12) check karo ki API ne kya bheja hai.");
            }

        } catch (e) {
            console.error("Fetch Error:", e);
            alert("Network Error! Ise Vercel par host karke chalao.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
