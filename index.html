<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastVideoSave Pro | No Login Downloader</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --primary: #e1306c; --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: var(--insta-grad); width: 100%; color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 500px; width: 90%; background: white; margin-top: 50px; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .input-box { display: flex; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; margin-top: 25px; }
        input { flex: 1; padding: 18px; border: none; outline: none; font-size: 16px; width: 100%; }
        button#btn { background: var(--primary); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result { display: none; margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; }
        .thumb { width: 100%; max-width: 250px; border-radius: 10px; margin-bottom: 15px; }
        .dl-btn { background: #059669; color: white; padding: 15px 35px; border: none; border-radius: 10px; display: inline-block; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%; }
        .dl-btn:hover { background: #047857; }
    </style>
</head>
<body>

<header><h1>FastVideoSave Pro</h1></header>

<div class="container">
    <h2>Direct Reels Downloader</h2>
    <div class="input-box">
        <input type="text" id="instaLink" placeholder="Paste Reel link here...">
        <button id="btn" onclick="startDownload()">Download</button>
    </div>

    <div id="loader"></div>

    <div class="result" id="resCard">
        <img id="preview" class="thumb" src="">
        <p><strong style="color:#059669;">Video Found! 🎉</strong></p>
        <button id="downloadBtn" class="dl-btn">SAVE TO GALLERY</button>
        <p id="statusMsg" style="font-size:12px; color:#666; margin-top:10px;"></p>
    </div>
</div>

<script>
    let globalVideoUrl = "";

    async function startDownload() {
        const linkVal = document.getElementById('instaLink').value.trim();
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const card = document.getElementById('resCard');

        if(!linkVal) return alert("Bhai link dalo!");

        const KEY = 'aca31a75b6msh557466d454b2104p18dfeajsn57348f5e9cc8';
        const HOST = 'instagram-reels-downloader-api.p.rapidapi.com';

        btn.disabled = true;
        loader.style.display = 'block';
        card.style.display = 'none';

        try {
            const response = await fetch(`https://${HOST}/download?url=${encodeURIComponent(linkVal)}`, {
                method: 'GET',
                headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
            });

            const data = await response.json();
            globalVideoUrl = data.download_url || data.url || (data.data && data.data.url);
            const thumbUrl = data.thumbnail || 'https://via.placeholder.com/250x400';

            if (globalVideoUrl) {
                document.getElementById('preview').src = thumbUrl;
                card.style.display = 'block';
                
                // Set click event for final download
                document.getElementById('downloadBtn').onclick = () => forceDownload(globalVideoUrl);
            } else {
                alert("Link nahi mila! Shayad account private hai.");
            }
        } catch (e) {
            alert("Error! Refresh karke try karein.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    // --- SABSE IMPORTANT FUNCTION: Login Bypass karne ke liye ---
    async function forceDownload(url) {
        const status = document.getElementById('statusMsg');
        status.innerText = "Downloading to device... Please wait ⏳";
        
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = `InstaVideo_${Date.now()}.mp4`; // File ka naam
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(blobUrl);
            status.innerText = "Downloaded successfully! ✅";
        } catch (error) {
            console.error(error);
            // Agar blob block ho jaye (CORS), toh naye tab mein open kar do (Last Option)
            window.open(url, '_blank');
            status.innerText = "Download started in new tab. Click 3 dots to save.";
        }
    }
</script>

</body>
</html>
