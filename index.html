<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastVideoSave Pro | Final Fix</title>
    <style>
        :root { --primary: #e1306c; --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: var(--insta-grad); width: 100%; color: white; padding: 25px 0; text-align: center; }
        .container { max-width: 500px; width: 90%; background: white; margin-top: 50px; padding: 35px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); text-align: center; }
        .input-box { display: flex; border: 2px solid #ddd; border-radius: 14px; overflow: hidden; margin-top: 25px; }
        input { flex: 1; padding: 18px; border: none; outline: none; font-size: 16px; width: 100%; }
        button#btn { background: var(--primary); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
        #loader { display: none; margin: 25px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result { display: none; margin-top: 35px; padding: 25px; background: #fafafa; border-radius: 20px; border: 1px solid #eee; }
        .thumb { width: 100%; max-width: 260px; border-radius: 12px; margin-bottom: 20px; }
        .dl-btn { background: #059669; color: white; padding: 16px 40px; text-decoration: none; border-radius: 12px; display: inline-block; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<header><h1>FastVideoSave Pro</h1></header>

<div class="container">
    <h2>Instagram Downloader</h2>
    <div class="input-box">
        <input type="text" id="instaLink" placeholder="Paste link here...">
        <button id="btn" onclick="startDownload()">Fetch</button>
    </div>

    <div id="loader"></div>

    <div class="result" id="resCard">
        <img id="preview" class="thumb" src="">
        <p><strong style="color:#059669;">Video Found! 🎉</strong></p>
        
        <a href="" id="dlLink" class="dl-btn" target="_blank" rel="noreferrer" referrerpolicy="no-referrer" download>SAVE VIDEO</a>
        
        <p style="font-size:12px; color:#666; margin-top:15px; background:#fff3cd; padding:10px; border-radius:8px;">
            <b>Bhai Note:</b> Agar Instagram khul raha hai, toh button pe <b>Hold (Daba ke rakho)</b> karo aur <b>"Download Link"</b> select karo. Yeh 100% gallery me save karega.
        </p>
    </div>
</div>

<script>
    async function startDownload() {
        const linkVal = document.getElementById('instaLink').value.trim();
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const card = document.getElementById('resCard');

        const KEY = 'aca31a75b6msh557466d454b2104p18dfeajsn57348f5e9cc8';
        const HOST = 'instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com';

        btn.disabled = true;
        loader.style.display = 'block';
        card.style.display = 'none';

        try {
            const response = await fetch(`https://${HOST}/convert?url=${encodeURIComponent(linkVal)}`, {
                method: 'GET',
                headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
            });

            const data = await response.json();
            console.log("API Data:", data);

            // API specific link mapping
            let videoUrl = data.url || (data.data && data.data[0] && data.data[0].url);
            let thumbUrl = data.thumbnail || (data.data && data.data[0] && data.data[0].thumbnail) || 'https://via.placeholder.com/250x400';

            if (videoUrl) {
                document.getElementById('preview').src = thumbUrl;
                const dlBtn = document.getElementById('dlLink');
                
                // Redirection bypass trick
                dlBtn.href = videoUrl;
                
                card.style.display = 'block';
            } else {
                alert("Link nahi mila! Try another Reel.");
            }
        } catch (e) {
            alert("Error: API Limit ya Subscription check karein.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
