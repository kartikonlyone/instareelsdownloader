<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastVideoSave Pro | HD Downloader</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --primary: #e1306c; --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: var(--insta-grad); width: 100%; color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 500px; width: 90%; background: white; margin-top: 50px; padding: 35px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); text-align: center; }
        .input-box { display: flex; border: 2px solid #ddd; border-radius: 14px; overflow: hidden; margin-top: 25px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary); }
        input { flex: 1; padding: 18px; border: none; outline: none; font-size: 16px; width: 100%; }
        button#btn { background: var(--primary); color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result { display: none; margin-top: 35px; padding: 25px; background: #fafafa; border-radius: 20px; border: 1px solid #eee; }
        .dl-btn { background: #059669; color: white; padding: 16px 40px; border: none; border-radius: 12px; display: inline-block; font-weight: bold; font-size: 18px; width: 100%; cursor: pointer; transition: 0.3s; }
        .dl-btn:hover { background: #047857; transform: scale(1.02); }
        #status { font-size: 12px; color: #e1306c; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>FastVideoSave Pro</h1></header>

<div class="container">
    <h2 style="margin:0;">Instagram Downloader</h2>
    <div class="input-box">
        <input type="text" id="instaLink" placeholder="Paste Reel link here...">
        <button id="btn" onclick="startDownload()">Fetch</button>
    </div>
    <div id="loader"></div>
    <div class="result" id="resCard">
        <img id="preview" style="width:100%; max-width:250px; border-radius:12px; margin-bottom:20px;" src="">
        <p><strong style="color:#059669;">Video Found! 🎉</strong></p>
        <button id="saveBtn" class="dl-btn">SAVE TO GALLERY</button>
        <p id="status"></p>
    </div>
</div>

<script>
    let finalVideoUrl = "";

    async function startDownload() {
        const linkVal = document.getElementById('instaLink').value.trim();
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const card = document.getElementById('resCard');

        if(!linkVal) return alert("Bhai link toh dalo!");

        const KEY = 'aca31a75b6msh557466d454b2104p18dfeajsn57348f5e9cc8';
        const HOST = 'instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com';

        btn.disabled = true;
        loader.style.display = 'block';
        card.style.display = 'none';

        try {
            const response = await fetch(`https://${HOST}/convert?url=${encodeURIComponent(linkVal)}`, {
                method: 'GET',
                headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
            });

            const data = await response.json();
            
            // Link Scanner
            function findMp4(obj) {
                for (let k in obj) {
                    if (typeof obj[k] === 'string' && (obj[k].includes('.mp4') || obj[k].includes('video') || obj[k].includes('fbcdn'))) return obj[k];
                    if (typeof obj[k] === 'object' && obj[k] !== null) {
                        let res = findMp4(obj[k]);
                        if (res) return res;
                    }
                }
                return null;
            }

            finalVideoUrl = findMp4(data);
            const thumbUrl = data.thumbnail || (data.data && data.data[0]?.thumbnail) || 'https://via.placeholder.com/250';

            if (finalVideoUrl) {
                document.getElementById('preview').src = thumbUrl;
                document.getElementById('saveBtn').onclick = () => forceDownload(finalVideoUrl);
                card.style.display = 'block';
            } else {
                alert("Nahi mila! Shayad account Private hai.");
            }
        } catch (e) {
            alert("Error! Check RapidAPI subscription.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    // --- PRO LOGIC TO BYPASS "FILE NOT AVAILABLE" ---
    async function forceDownload(url) {
        const status = document.getElementById('status');
        status.innerText = "Downloading to browser memory... ⏳";
        
        try {
            const resp = await fetch(url);
            const blob = await resp.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = `FastVideoSave_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(blobUrl);
            status.innerText = "Downloaded Successfully! ✅";
        } catch (err) {
            console.log("CORS block, opening in new tab...");
            window.open(url, '_blank');
            status.innerText = "Direct link opened. Long press to save!";
        }
    }
</script>
</body>
</html>
