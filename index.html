<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastVideoSave Pro | HD Downloader</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --primary: #e1306c; --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { background: var(--insta-grad); width: 100%; color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 550px; width: 90%; background: white; margin-top: 50px; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        
        .input-box { display: flex; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; margin-top: 25px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary); }
        input { flex: 1; padding: 18px; border: none; outline: none; font-size: 16px; width: 100%; }
        button#btn { background: var(--primary); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button#btn:disabled { background: #ccc; }

        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result { display: none; margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; }
        .thumb { width: 100%; max-width: 250px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dl-btn { background: #059669; color: white; padding: 15px 35px; text-decoration: none; border-radius: 10px; display: inline-block; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .dl-btn:hover { background: #047857; transform: scale(1.05); }
    </style>
</head>
<body>

<header><h1>FastVideoSave Pro</h1></header>

<div class="container">
    <h2>Reels Downloader</h2>
    <p style="color:#666; font-size:14px;">Download Instagram Reels & Videos in HD</p>
    
    <div class="input-box">
        <input type="text" id="instaLink" placeholder="Paste Link Here...">
        <button id="btn" onclick="startDownload()">Download</button>
    </div>

    <div id="loader"></div>

    <div class="result" id="resCard">
        <img id="preview" class="thumb" src="">
        <p><strong>Video Found! 🎉</strong></p>
        <a href="" id="dlLink" class="dl-btn" target="_blank" rel="noopener noreferrer">DOWNLOAD NOW</a>
    </div>
</div>

<script>
    async function startDownload() {
        const linkVal = document.getElementById('instaLink').value.trim();
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const card = document.getElementById('resCard');

        if(!linkVal) return alert("Bhai link toh dalo!");

        // --- APKI UPDATED DETAILS ---
        const KEY = 'aca31a75b6msh557466d454b2104p18dfeajsn57348f5e9cc8';
        const HOST = 'instagram-downloader-download-instagram-videos-stories.p.rapidapi.com';

        btn.disabled = true;
        loader.style.display = 'block';
        card.style.display = 'none';

        try {
            // Updated Endpoint: /index?url=
            const response = await fetch(`https://${HOST}/index?url=${encodeURIComponent(linkVal)}`, {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': KEY,
                    'x-rapidapi-host': HOST
                }
            });

            if (response.status === 403) {
                alert("Error 403: Bhai is wali API ko Pricing tab me jaakar Subscribe (Free) karo!");
                return;
            }

            const data = await response.json();
            console.log("API Response:", data);

            // Is API ka data structure handle karna
            let videoUrl = '';
            let thumbUrl = '';

            // Check if data exists in different possible keys
            if (data.media) {
                videoUrl = data.media;
                thumbUrl = data.thumbnail || 'https://via.placeholder.com/250x400';
            } else if (data.data && data.data[0]) {
                videoUrl = data.data[0].url || data.data[0].link;
                thumbUrl = data.data[0].thumbnail || 'https://via.placeholder.com/250x400';
            } else if (data.url) {
                videoUrl = data.url;
                thumbUrl = data.thumbnail || 'https://via.placeholder.com/250x400';
            }

            if(videoUrl) {
                document.getElementById('preview').src = thumbUrl;
                document.getElementById('dlLink').href = videoUrl;
                card.style.display = 'block';
            } else {
                alert("Video link nahi mila. Shayad link galat hai ya account Private hai.");
            }

        } catch(e) {
            console.error("Fetch Error:", e);
            alert("Bhai request block ho gayi (CORS). Ise online host (Vercel/Netlify) karo.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
