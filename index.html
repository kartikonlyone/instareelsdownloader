<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastVideoSave Pro | HD Reels Downloader</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --primary: #e1306c; --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { background: var(--insta-grad); width: 100%; color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; text-transform: uppercase; }

        .container { max-width: 500px; width: 90%; background: white; margin-top: 50px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        
        .input-box { display: flex; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; margin-top: 25px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary); }
        input { flex: 1; padding: 15px; border: none; outline: none; font-size: 16px; width: 100%; }
        button#btn { background: var(--primary); color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        button#btn:disabled { background: #ccc; }

        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result { display: none; margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .thumb { width: 100%; max-width: 250px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dl-btn { background: #059669; color: white; padding: 15px 35px; text-decoration: none; border-radius: 10px; display: inline-block; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .dl-btn:hover { background: #047857; transform: scale(1.05); }

        .footer { margin-top: 50px; color: #666; font-size: 13px; text-align: center; padding-bottom: 30px; }
    </style>
</head>
<body>

<header><h1>FastVideoSave Pro</h1></header>

<div class="container">
    <h2 style="margin:0; color:#333;">Reels Downloader</h2>
    <p style="color:#666; font-size:14px;">Download Instagram Reels & Videos instantly.</p>
    
    <div class="input-box">
        <input type="text" id="instaLink" placeholder="Paste Reel link here...">
        <button id="btn" onclick="startDownload()">Get Video</button>
    </div>

    <div id="loader"></div>

    <div class="result" id="resCard">
        <img id="preview" class="thumb" src="">
        <p><strong style="color:#059669;">Video Found! 🎉</strong></p>
        <a href="" id="dlLink" class="dl-btn" target="_blank" rel="noopener noreferrer">DOWNLOAD NOW</a>
        <p style="font-size:11px; color:#999; margin-top:10px;">Note: If video plays instead of downloading, click the 3 dots and Save.</p>
    </div>
</div>

<div class="footer">
    &copy; 2026 FastVideoSave Pro - Made for Kartik
</div>

<script>
    async function startDownload() {
        const linkVal = document.getElementById('instaLink').value.trim();
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const card = document.getElementById('resCard');

        if(!linkVal) return alert("Bhai, pehle link toh dalo!");

        // --- APKI LATEST CURL DETAILS ---
        const KEY = 'aca31a75b6msh557466d454b2104p18dfeajsn57348f5e9cc8';
        const HOST = 'instagram-reels-downloader-api.p.rapidapi.com';

        btn.disabled = true;
        loader.style.display = 'block';
        card.style.display = 'none';

        try {
            // Updated Endpoint URL as per your curl
            const response = await fetch(`https://${HOST}/download?url=${encodeURIComponent(linkVal)}`, {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': KEY,
                    'x-rapidapi-host': HOST
                }
            });

            if (response.status === 403) {
                alert("Error 403: Bhai, is specific API ko Subscribe karna bacha hai. Dashboard check karo!");
                return;
            }

            const data = await response.json();
            console.log("API Result:", data);

            // Mapping Response: Is API me link aksar 'download_url' ya 'url' me hota hai
            const videoUrl = data.download_url || data.url || (data.data && data.data.url);
            const thumbUrl = data.thumbnail || data.thumb || 'https://via.placeholder.com/250x400?text=Video+Ready';

            if (videoUrl) {
                document.getElementById('preview').src = thumbUrl;
                document.getElementById('dlLink').href = videoUrl;
                card.style.display = 'block';
            } else {
                alert("Video nahi mil payi. Shayad account Private hai!");
            }

        } catch (e) {
            console.error("Error:", e);
            alert("Network Error! Ise Vercel par deploy karke check karo.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
